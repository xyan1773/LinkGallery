<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f5f7" />
  <title>反馈 - LinkGallery / Feedback</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .feedback-section {
      max-width: 600px;
      margin: 140px auto 80px;
      padding: 40px;
      background: rgba(255,255,255,.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.9);
      border-radius: 24px;
      box-shadow: var(--shadow-sm);
    }
    .form-group {
      margin-bottom: 24px;
      text-align: left;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
    }
    .form-control {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 15px;
      background: var(--surface);
      color: var(--ink);
      font-family: inherit;
      transition: all 0.2s var(--ease);
      outline: none;
    }
    .form-control:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(0,102,204,.12);
      background: white;
    }
    textarea.form-control {
      min-height: 120px;
      resize: vertical;
    }
    .submit-btn {
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>
<body class="lang-zh">
  <nav class="navbar">
    <div class="nav-content">
      <div class="brand">
        <svg class="brand-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="4" ry="4"></rect>
          <circle cx="8.5" cy="8.5" r="1.5"></circle>
          <polyline points="21 15 16 10 5 21"></polyline>
        </svg>
        <span class="brand-text">LinkGallery</span>
      </div>
      <div class="nav-links">
        <a href="index.html">
          <span class="zh">返回首页</span>
          <span class="en">Back to Home</span>
        </a>
        <div class="lang-switcher">
          <button id="langToggle">
            <span class="zh">EN</span>
            <span class="en">中文</span>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main>
    <section class="feedback-section text-center">
      <h2 class="section-title">
        <span class="zh">设备适配请求</span>
        <span class="en">Device Request</span>
      </h2>
      <p class="section-subtitle" style="margin-bottom: 30px;">
        <span class="zh">告诉我们您希望 LinkGallery 下一步支持什么设备。</span>
        <span class="en">Let us know what device you want LinkGallery to support next.</span>
      </p>

      <form action="#" method="get" onsubmit="alert('感谢您的反馈！ / Thank you for your feedback!'); return false;">
        <div class="form-group">
          <label for="device">
            <span class="zh">设备型号 / 平台</span>
            <span class="en">Device Model / Platform</span>
          </label>
          <input type="text" id="device" class="form-control" placeholder="e.g. Sony A7M4, macOS, Meta Quest 3" required>
        </div>

        <div class="form-group">
          <label for="reason">
            <span class="zh">为什么需要支持这个设备？</span>
            <span class="en">Why do you need support for this device?</span>
          </label>
          <textarea id="reason" class="form-control" placeholder="..." required></textarea>
        </div>

        <button type="submit" class="btn btn-primary submit-btn">
          <span class="zh">提交反馈</span>
          <span class="en">Submit Feedback</span>
        </button>
      </form>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
