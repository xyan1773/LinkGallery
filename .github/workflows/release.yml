name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  desktop:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: Directory.Packages.props
      - name: Publish self-contained Windows executable
        shell: pwsh
        run: >-
          dotnet publish desktop/LinkGallery.Desktop/LinkGallery.Desktop.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=None
          --output artifacts/release/desktop
      - name: Prepare Windows release asset
        shell: pwsh
        run: >-
          Move-Item
          artifacts/release/desktop/LinkGallery.Desktop.exe
          artifacts/release/LinkGallery-Windows-x64.exe
      - name: Upload Windows release asset
        uses: actions/upload-artifact@v7
        with:
          name: release-windows-x64
          path: artifacts/release/LinkGallery-Windows-x64.exe
          if-no-files-found: error
          retention-days: 14

  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
      - name: Build installable debug APK
        run: ./gradlew assembleDebug
      - name: Prepare Android release asset
        run: |
          mkdir -p ../artifacts/release
          cp app/build/outputs/apk/debug/app-debug.apk \
            ../artifacts/release/LinkGallery-Android-debug.apk
      - name: Upload Android release asset
        uses: actions/upload-artifact@v7
        with:
          name: release-android
          path: artifacts/release/LinkGallery-Android-debug.apk
          if-no-files-found: error
          retention-days: 14

  release:
    name: Sync GitHub Release
    needs: [desktop, android]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
      PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
    steps:
      - uses: actions/checkout@v6
      - name: Download release assets
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum LinkGallery-Windows-x64.exe LinkGallery-Android-debug.apk \
            > SHA256SUMS.txt
      - name: Create or update GitHub Release
        shell: bash
        run: |
          set -euo pipefail
          release_args=(
            "$RELEASE_TAG"
            release-assets/LinkGallery-Windows-x64.exe
            release-assets/LinkGallery-Android-debug.apk
            release-assets/SHA256SUMS.txt
          )

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "${release_args[@]}" --clobber
            exit 0
          fi

          extra_args=(
            --target "$GITHUB_SHA"
            --title "LinkGallery $RELEASE_TAG"
            --generate-notes
          )
          if [[ "$PRERELEASE" == "true" ]]; then
            extra_args+=(--prerelease)
          fi
          gh release create "${release_args[@]}" "${extra_args[@]}"
