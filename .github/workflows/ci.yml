name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  protocol:
    name: Protocol
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lint OpenAPI
        run: npx --yes @redocly/cli@2.35.1 lint protocol/openapi.yaml

  desktop:
    name: Desktop
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: Directory.Packages.props
      - name: Restore
        run: dotnet restore LinkGallery.sln
      - name: Build
        run: dotnet build LinkGallery.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test LinkGallery.sln --configuration Release --no-build --collect:"XPlat Code Coverage"

  android:
    name: Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
      - name: Build and test
        run: ./gradlew assembleDebug testDebugUnitTest
