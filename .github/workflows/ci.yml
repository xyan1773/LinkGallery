name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  protocol:
    name: Protocol
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lint OpenAPI
        run: |
          set -o pipefail
          mkdir -p artifacts/test-results/protocol
          npx --yes @redocly/cli@2.35.1 lint protocol/openapi.yaml 2>&1 \
            | tee artifacts/test-results/protocol/protocol-lint.txt
      - name: Upload protocol report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: protocol-test-report
          path: artifacts/test-results/protocol
          if-no-files-found: warn

  desktop:
    name: Desktop
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: Directory.Packages.props
      - name: Restore
        run: dotnet restore LinkGallery.sln
      - name: Build
        run: dotnet build LinkGallery.sln --configuration Release --no-restore
      - name: Test
        run: >-
          dotnet test LinkGallery.sln --configuration Release --no-build
          --results-directory artifacts/test-results/desktop
          --logger:"trx;LogFileName=desktop-tests.trx"
          --collect:"XPlat Code Coverage"
      - name: Upload desktop test reports and coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: desktop-test-report
          path: artifacts/test-results/desktop
          if-no-files-found: warn

  android:
    name: Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
      - name: Build and test
        run: ./gradlew assembleDebug testDebugUnitTest
      - name: Upload Android unit-test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-test-report
          path: |
            android/app/build/test-results/testDebugUnitTest
            android/app/build/reports/tests/testDebugUnitTest
          if-no-files-found: warn
