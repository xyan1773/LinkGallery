name: 功能建议
description: 提议一个符合产品边界的改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    attributes:
      label: 用户问题
      description: 先描述要解决的问题，而不是实现方式。
    validations:
      required: true
  - type: textarea
    attributes:
      label: 建议方案
    validations:
      required: true
  - type: dropdown
    attributes:
      label: 是否会修改手机媒体
      options:
        - "不会"
        - "可能会"
    validations:
      required: true

