name: Bug 报告
description: 报告可复现的软件问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: 问题描述
      description: 实际发生了什么？
    validations:
      required: true
  - type: textarea
    attributes:
      label: 复现步骤
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: input
    attributes:
      label: 版本与环境
      placeholder: Windows、Android、应用版本、网络环境
    validations:
      required: true
  - type: textarea
    attributes:
      label: 日志或截图
      description: 请先移除令牌、密钥和私人媒体路径。

