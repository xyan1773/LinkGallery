openapi: 3.0.3
info:
  title: LinkGallery Companion API
  version: 0.1.0
  description: Read-only LAN API exposed by the Android companion.
servers:
  - url: http://{deviceAddress}:39570/api/v1
    variables:
      deviceAddress:
        default: 192.168.1.10
security:
  - bearerAuth: []
paths:
  /public/info:
    get:
      summary: Get the stable public identity used for discovery and pairing
      operationId: getPublicDeviceInfo
      security: []
      responses:
        "200":
          description: Public device identity and pairing availability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicDeviceInfo"
        "404":
          $ref: "#/components/responses/NotFound"
  /pair/start:
    post:
      summary: Start pairing with this phone
      operationId: startPairing
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PairStartRequest"
      responses:
        "200":
          description: Pairing session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairStartResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /pair/confirm:
    post:
      summary: Confirm a pending pairing session
      operationId: confirmPairing
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PairConfirmRequest"
      responses:
        "200":
          description: Pairing completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairConfirmResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /pair/cancel:
    post:
      summary: Cancel a pending pairing session
      operationId: cancelPairing
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PairCancelRequest"
      responses:
        "200":
          description: Pairing session cancelled
        "400":
          $ref: "#/components/responses/BadRequest"
  /pair/revoke:
    post:
      summary: Revoke the bearer token used for this request
      operationId: revokePairing
      responses:
        "200":
          description: Pairing credential revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
  /device:
    get:
      summary: Get information about this phone
      operationId: getDevice
      responses:
        "200":
          description: Device information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /media:
    get:
      summary: Get a page of media metadata
      operationId: getMediaPage
      parameters:
        - name: cursor
          in: query
          description: >
            Opaque keyset cursor returned by the preceding page. Media is ordered by
            sort time descending and stable media ID descending. Clients must not
            parse or construct this value. Use either cursor or beforeSortTime/beforeId,
            not both.
          schema:
            type: string
        - name: beforeSortTime
          in: query
          description: >
            Explicit keyset cursor timestamp in epoch milliseconds. When provided,
            beforeId is also required.
          schema:
            type: integer
            format: int64
            minimum: 0
        - name: beforeId
          in: query
          description: Explicit keyset cursor media ID paired with beforeSortTime.
          schema:
            type: integer
            format: int64
            minimum: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
        - name: type
          in: query
          schema:
            type: string
            example: image,video
        - name: albumId
          in: query
          description: >
            Stable MediaStore album identifier. When supplied, only media in that
            album is returned and the opaque cursor is bound to this filter.
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: A page of media metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /media/sync/state:
    get:
      summary: Get the current media library synchronization state
      operationId: getMediaSyncState
      responses:
        "200":
          description: Current library version, opaque latest cursor, and item count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaSyncState"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /media/changes:
    get:
      summary: Get media metadata changes after an opaque synchronization cursor
      operationId: getMediaChanges
      parameters:
        - name: after
          in: query
          description: Opaque cursor returned by sync/state or a preceding changes page.
          schema:
            type: string
            nullable: true
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 200
      responses:
        "200":
          description: One atomic page of metadata upserts and deletion tombstones
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaChanges"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /media/manifest:
    get:
      summary: Get a lightweight page of current media IDs and generations
      operationId: getMediaManifest
      parameters:
        - name: cursor
          in: query
          description: Opaque cursor returned by the preceding manifest page.
          schema:
            type: string
            nullable: true
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 500
      responses:
        "200":
          description: Lightweight manifest page used to reconcile deletions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaManifestPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /media/{mediaId}/thumbnail:
    get:
      summary: Get a generated media thumbnail
      operationId: getThumbnail
      parameters:
        - $ref: "#/components/parameters/MediaId"
        - name: width
          in: query
          required: false
          description: Requested bounding-box width. The response preserves aspect ratio.
          schema:
            type: integer
            minimum: 1
            maximum: 2048
        - name: height
          in: query
          required: false
          description: Requested bounding-box height. The response preserves aspect ratio.
          schema:
            type: integer
            minimum: 1
            maximum: 2048
        - name: size
          in: query
          required: false
          description: Preferred square thumbnail size. When supplied, width and height are both set to this value.
          schema:
            type: integer
            minimum: 1
            maximum: 2048
        - name: If-None-Match
          in: header
          schema:
            type: string
      responses:
        "200":
          description: Encoded thumbnail
          headers:
            Cache-Control:
              schema:
                type: string
            ETag:
              schema:
                type: string
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "304":
          description: Cached thumbnail is still current
          headers:
            Cache-Control:
              schema:
                type: string
            ETag:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /media/{mediaId}/content:
    get:
      summary: Stream original media content
      operationId: getMediaContent
      parameters:
        - $ref: "#/components/parameters/MediaId"
        - name: Range
          in: header
          schema:
            type: string
            example: bytes=1048576-
      responses:
        "200":
          description: Complete media content
          headers:
            Accept-Ranges:
              schema:
                type: string
                enum: [bytes]
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "206":
          description: Partial media content
          headers:
            Accept-Ranges:
              schema:
                type: string
                enum: [bytes]
            Content-Range:
              schema:
                type: string
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"
        "416":
          description: Requested byte range is not satisfiable
          headers:
            Accept-Ranges:
              schema:
                type: string
                enum: [bytes]
            Content-Range:
              required: true
              schema:
                type: string
                example: bytes */123456
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    MediaId:
      name: mediaId
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: Authentication is missing or invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
    Forbidden:
      description: Android media permission has not been granted
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: The requested media item does not exist
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
  schemas:
    Problem:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
    PublicDeviceInfo:
      type: object
      required:
        - deviceId
        - deviceName
        - manufacturer
        - model
        - apiVersion
        - serverVersion
        - instanceId
        - pairingAvailable
        - certificateFingerprint
      properties:
        deviceId:
          type: string
        deviceName:
          type: string
        manufacturer:
          type: string
        model:
          type: string
        apiVersion:
          type: integer
        serverVersion:
          type: string
        instanceId:
          type: string
        pairingAvailable:
          type: boolean
        certificateFingerprint:
          type: string
    PairStartRequest:
      type: object
      required:
        - desktopId
        - desktopName
        - identityPublicKey
        - ephemeralPublicKey
        - nonce
      properties:
        desktopId:
          type: string
        desktopName:
          type: string
        desktopModel:
          type: string
          nullable: true
        identityPublicKey:
          type: string
        ephemeralPublicKey:
          type: string
        nonce:
          type: string
    PairStartResponse:
      type: object
      required:
        - pairingSessionId
        - phoneNonce
        - expiresAtEpochMillis
        - attemptsRemaining
        - codeLength
      properties:
        pairingSessionId:
          type: string
        phoneNonce:
          type: string
        expiresAtEpochMillis:
          type: integer
          format: int64
        attemptsRemaining:
          type: integer
        codeLength:
          type: integer
    PairConfirmRequest:
      type: object
      required: [pairingSessionId, verificationCode]
      properties:
        pairingSessionId:
          type: string
        verificationCode:
          type: string
          description: Six-digit legacy pairing code or eight-digit hexadecimal IPv4 address code.
          pattern: "^([0-9]{6}|[0-9A-Fa-f]{8})$"
    PairConfirmResponse:
      type: object
      required: [paired, accessToken, tokenType]
      properties:
        paired:
          type: boolean
        accessToken:
          type: string
        tokenType:
          type: string
          enum: [Bearer]
    PairCancelRequest:
      type: object
      required: [pairingSessionId]
      properties:
        pairingSessionId:
          type: string
    DeviceInfo:
      type: object
      required: [id, name, platform, mediaCount]
      properties:
        id:
          type: string
        name:
          type: string
        platform:
          type: string
          enum: [android]
        model:
          type: string
          nullable: true
        battery:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
        mediaCount:
          type: integer
          minimum: 0
    MediaItem:
      type: object
      required:
        [id, fileName, type, fileSize, takenAt, modifiedAt]
      properties:
        id:
          type: string
        fileName:
          type: string
        type:
          type: string
          enum: [image, video]
        fileSize:
          type: integer
          format: int64
        width:
          type: integer
          nullable: true
        height:
          type: integer
          nullable: true
        durationMilliseconds:
          type: integer
          format: int64
          nullable: true
        takenAt:
          type: string
          format: date-time
        modifiedAt:
          type: string
          format: date-time
        albumId:
          type: string
          nullable: true
        albumName:
          type: string
          nullable: true
        relativePath:
          type: string
          nullable: true
        generation:
          type: integer
          format: int64
          nullable: true
          description: MediaStore generation, or null when unavailable on API 29.
        thumbnailUrl:
          type: string
          nullable: true
        sourceDevice:
          type: string
          nullable: true
        sourceApplication:
          type: string
          nullable: true
        isEditedExport:
          type: boolean
          default: false
    MediaPage:
      type: object
      required: [items, hasMore, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MediaItem"
        nextCursor:
          type: string
          description: Opaque cursor for the next page; null when the snapshot tail is reached.
          nullable: true
        hasMore:
          type: boolean
          description: True when another page can be requested.
        total:
          type: integer
          minimum: 0
          description: Total media count matching the current type filter.
    MediaSyncState:
      type: object
      required: [libraryVersion, latestCursor, total]
      properties:
        libraryVersion:
          type: string
        latestCursor:
          type: string
          description: Versioned opaque cursor. Clients must not parse or construct it.
        total:
          type: integer
          minimum: 0
    MediaChanges:
      type: object
      required:
        [libraryVersion, nextCursor, latestCursor, hasMore, upserts, deletes]
      properties:
        libraryVersion:
          type: string
        fromCursor:
          type: string
          nullable: true
        nextCursor:
          type: string
        latestCursor:
          type: string
        hasMore:
          type: boolean
        upserts:
          type: array
          items:
            $ref: "#/components/schemas/MediaItem"
        deletes:
          type: array
          description: Media IDs removed since fromCursor when deletion logging is available.
          items:
            type: string
    MediaManifestEntry:
      type: object
      required: [id]
      properties:
        id:
          type: string
        generation:
          type: integer
          format: int64
          nullable: true
    MediaManifestPage:
      type: object
      required: [libraryVersion, items, hasMore]
      properties:
        libraryVersion:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/MediaManifestEntry"
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean
