openapi: 3.0.3
info:
  title: LinkGallery Companion API
  version: 0.1.0
  description: Read-only LAN API exposed by the Android companion.
servers:
  - url: http://{deviceAddress}:39570/api/v1
    variables:
      deviceAddress:
        default: 192.168.1.10
security:
  - bearerAuth: []
paths:
  /pair/request:
    post:
      summary: Start pairing with this phone
      operationId: requestPairing
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PairingRequest"
      responses:
        "202":
          description: Pairing is waiting for confirmation on the phone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairingChallenge"
        "400":
          $ref: "#/components/responses/BadRequest"
  /pair/confirm:
    post:
      summary: Confirm a pending pairing session
      operationId: confirmPairing
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PairingConfirmation"
      responses:
        "200":
          description: Pairing completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairingResult"
        "400":
          $ref: "#/components/responses/BadRequest"
  /device:
    get:
      summary: Get information about this phone
      operationId: getDevice
      security: []
      responses:
        "200":
          description: Device information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /media:
    get:
      summary: Get a page of media metadata
      operationId: getMediaPage
      security: []
      parameters:
        - name: cursor
          in: query
          description: >
            Opaque keyset cursor returned by the preceding page. Media is ordered by
            sort time descending and stable media ID descending. Clients must not
            parse or construct this value. Use either cursor or beforeSortTime/beforeId,
            not both.
          schema:
            type: string
        - name: beforeSortTime
          in: query
          description: >
            Explicit keyset cursor timestamp in epoch milliseconds. When provided,
            beforeId is also required.
          schema:
            type: integer
            format: int64
            minimum: 0
        - name: beforeId
          in: query
          description: Explicit keyset cursor media ID paired with beforeSortTime.
          schema:
            type: integer
            format: int64
            minimum: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
        - name: type
          in: query
          schema:
            type: string
            example: image,video
      responses:
        "200":
          description: A page of media metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /media/{mediaId}/thumbnail:
    get:
      summary: Get a generated media thumbnail
      operationId: getThumbnail
      parameters:
        - $ref: "#/components/parameters/MediaId"
        - name: width
          in: query
          required: false
          description: Requested bounding-box width. The response preserves aspect ratio.
          schema:
            type: integer
            minimum: 1
            maximum: 2048
        - name: height
          in: query
          required: false
          description: Requested bounding-box height. The response preserves aspect ratio.
          schema:
            type: integer
            minimum: 1
            maximum: 2048
        - name: size
          in: query
          required: false
          description: Preferred square thumbnail size. When supplied, width and height are both set to this value.
          schema:
            type: integer
            minimum: 1
            maximum: 2048
        - name: If-None-Match
          in: header
          schema:
            type: string
      responses:
        "200":
          description: Encoded thumbnail
          headers:
            Cache-Control:
              schema:
                type: string
            ETag:
              schema:
                type: string
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "304":
          description: Cached thumbnail is still current
          headers:
            Cache-Control:
              schema:
                type: string
            ETag:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /media/{mediaId}/content:
    get:
      summary: Stream original media content
      operationId: getMediaContent
      parameters:
        - $ref: "#/components/parameters/MediaId"
        - name: Range
          in: header
          schema:
            type: string
            example: bytes=1048576-
      responses:
        "200":
          description: Complete media content
          headers:
            Accept-Ranges:
              schema:
                type: string
                enum: [bytes]
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "206":
          description: Partial media content
          headers:
            Accept-Ranges:
              schema:
                type: string
                enum: [bytes]
            Content-Range:
              schema:
                type: string
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"
        "416":
          description: Requested byte range is not satisfiable
          headers:
            Accept-Ranges:
              schema:
                type: string
                enum: [bytes]
            Content-Range:
              required: true
              schema:
                type: string
                example: bytes */123456
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    MediaId:
      name: mediaId
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: Authentication is missing or invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
    Forbidden:
      description: Android media permission has not been granted
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: The requested media item does not exist
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
  schemas:
    Problem:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
    PairingRequest:
      type: object
      required: [desktopDeviceId, desktopName, desktopPublicKey, oneTimeToken]
      properties:
        desktopDeviceId:
          type: string
        desktopName:
          type: string
        desktopPublicKey:
          type: string
          description: Base64 encoded public key
        oneTimeToken:
          type: string
          description: Short-lived secret encoded in the QR code
    PairingChallenge:
      type: object
      required: [sessionId, confirmationCode, expiresAt]
      properties:
        sessionId:
          type: string
        confirmationCode:
          type: string
          pattern: "^[0-9]{6}$"
        expiresAt:
          type: string
          format: date-time
    PairingConfirmation:
      type: object
      required: [sessionId, confirmationCode]
      properties:
        sessionId:
          type: string
        confirmationCode:
          type: string
          pattern: "^[0-9]{6}$"
    PairingResult:
      type: object
      required: [deviceId, devicePublicKey, accessToken, expiresAt]
      properties:
        deviceId:
          type: string
        devicePublicKey:
          type: string
          description: Base64 encoded public key
        accessToken:
          type: string
        expiresAt:
          type: string
          format: date-time
    DeviceInfo:
      type: object
      required: [id, name, platform, mediaCount]
      properties:
        id:
          type: string
        name:
          type: string
        platform:
          type: string
          enum: [android]
        model:
          type: string
          nullable: true
        battery:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
        mediaCount:
          type: integer
          minimum: 0
    MediaItem:
      type: object
      required:
        [id, fileName, type, fileSize, takenAt, modifiedAt]
      properties:
        id:
          type: string
        fileName:
          type: string
        type:
          type: string
          enum: [image, video]
        fileSize:
          type: integer
          format: int64
        width:
          type: integer
          nullable: true
        height:
          type: integer
          nullable: true
        durationMilliseconds:
          type: integer
          format: int64
          nullable: true
        takenAt:
          type: string
          format: date-time
        modifiedAt:
          type: string
          format: date-time
        albumName:
          type: string
          nullable: true
        relativePath:
          type: string
          nullable: true
        thumbnailUrl:
          type: string
          nullable: true
        sourceDevice:
          type: string
          nullable: true
        sourceApplication:
          type: string
          nullable: true
        isEditedExport:
          type: boolean
          default: false
    MediaPage:
      type: object
      required: [items, hasMore, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MediaItem"
        nextCursor:
          type: string
          description: Opaque cursor for the next page; null when the snapshot tail is reached.
          nullable: true
        hasMore:
          type: boolean
          description: True when another page can be requested.
        total:
          type: integer
          minimum: 0
          description: Total media count matching the current type filter.
